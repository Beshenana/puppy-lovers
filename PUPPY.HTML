<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>puppy lovers</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playwrite+GB+J:ital,wght@0,100..400;1,100..400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/puppystyle.css" />
  </head>
  <body>

    <header class="bluebg">
      <h1>puppy lovers page</h1>
    </header>

    <section class="puppy-1">
      <img src="puppyimage/puppy-1.jpg" alt="" />
    </section>

    <section class="nearer">
      <div class="container mt-4">
        <div class="row">
          <div class="col-12 col-md-4 puppy-2">
            <img src="puppyimage/puppy-2.jpg" alt="" class="w-100" />
          </div>
          <div class="col-12 col-md-4 puppymissing">
            <p>puppy missing here!!</p>
          </div>
          <div class="col-12 col-md-4 puppy-3">
            <img src="puppyimage/puppy-3.jpg" alt="" class="w-100" />
          </div>
        </div>
      </div>
    </section>

    <section class="ends">
      <div class="container mt-4">
        <div class="row">
          <div class="col-12 morepuppy">
            <h2>more puppies</h2>
          </div>
          <div class="col-12 col-md-6 puppy-4">
            <img src="puppyimage/puppy4.jpg" alt="" class="w-100" />
          </div>
          <div class="col-12 col-md-6 puppy-5">
            <img src="puppyimage/puppy-5.jpg" alt="" class="w-100" />
          </div>
        </div>
      </div>
    </section>

    <footer class="banner">
      <h2>Developed by: Beshenana Bayisa</h2>
    </footer>
  </body>
</html>
